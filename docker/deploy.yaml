---
- name: DevOps Final Deployment Automation (Raw Execution)
  hosts: web_servers
  gather_facts: false
  vars:
    project_path: "/app/project"
    backup_dir: "/app/backups"
    db_name: "ANG_Panha-db"
    db_user: "root"
    db_pass: "Hello@123"

  tasks:
    # 1. RUN GIT PULL (Ensuring no local changes block it)
    - name: Reset local repository changes
      raw: "cd {{ project_path }} && git reset --hard HEAD && git pull origin main"

    # 2. BUILD COMPOSER AND NPM
    - name: Install Composer dependencies
      raw: "cd {{ project_path }} && composer install --no-interaction --quiet"

    - name: Install NPM dependencies
      raw: "cd {{ project_path }} && npm install --no-audit --no-fund"

    # 3. RUN TEST AGAINST SQLITE DB (With internet retry and offline fallback)
    - name: Run test suite using SQLite profile
      raw: "cd {{ project_path }} && ./mvnw test -Dspring.profiles.active=test -o || (sleep 2 && cd {{ project_path }} && ./mvnw test -Dspring.profiles.active=test)"

    # 4. BACKUP THE MYSQL DATABASE
    - name: Backup live MySQL database
      raw: "mkdir -p {{ backup_dir }} && mysqldump -h mysql -u {{ db_user }} -p'{{ db_pass }}' {{ db_name }} > {{ backup_dir }}/backup_prod.sql"
