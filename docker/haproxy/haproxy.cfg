global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    retries 3
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# ==========================================
# 1. WEB TRAFFIC LOAD BALANCING (Port 8090)
# ==========================================
frontend http_front
    bind *:8090
    mode http
    default_backend http_back

backend http_back
    mode http
    balance roundrobin
    # Session cookie persistence (optional, useful for Spring Boot sessions)
    cookie SERVERID insert indirect nocache
    
    # Backend Spring Boot instances (Docker DNS routes these by container name)
    server web-server-1 web-server-1:8080 cookie s1 check inter 3000 rise 2 fall 3
    server web-server-2 web-server-2:8080 cookie s2 check inter 3000 rise 2 fall 3

# ==========================================
# 2. SSH TRAFFIC LOAD BALANCING (Port 22)
# ==========================================
frontend ssh_front
    bind *:22
    mode tcp
    option tcplog
    default_backend ssh_back

backend ssh_back
    mode tcp
    balance roundrobin
    # Backend SSH targets (assuming backend containers run SSH on port 22)
    server web-server-1-ssh web-server-1:22 check inter 5000 rise 2 fall 3
    server web-server-2-ssh web-server-2:22 check inter 5000 rise 2 fall 3

# ==========================================
# 3. HAPROXY STATS DASHBOARD (Port 1936)
# ==========================================
listen stats
    bind *:1936
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats auth admin:admin_password
